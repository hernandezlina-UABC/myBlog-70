<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            flex-direction: row;
            justify-content: space-evenly; /* horizontally*/
            align-items: flex-start; /*vertically*/
            background-color: lightgray;
            height: 400px;
        
        }
        .card{
            width: 100px;
            height: 100px;
            background-color: coral;
            margin: 1px;
            font-size: 20px;
            color: white;
            border-radius: 8px;
            font-weight: bold;
            font-family: arial;
        }
    </style>
</head>
<body> 
    <div class="container">
        <div class="card"> 1</div>
        <div class="card"> 2</div>
        <div class="card"> 3</div>
    </div>

</body>
</html>
