<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div class="form-container">
        <h2>Contact Us</h2>
        <p> This is information for the user</p>
        <!--action will be use in the furter-->
        <form action="">
            <div class="input-container">
                <label>Name: </label>
                <input type="text" placeholder="Your name" id="txtName" name="user_name">
            </div>
            <div class="input-container">
                <label>Age: </label>
                <input type="number" placeholder="18" id="intAge" name="user_age">
            </div>
            <div class="input-container">
                <label>Password: </label>
                <input type="password" placeholder="*****d" id="password" name="user_password">
            </div>
            <div class="input-container">
                <label>Email: </label>
                <input type="email" placeholder="user@example.com" id="email" name="user_email">
            </div>
            <div class="input-container">
                <label>Phone: </label>
                <input type="number" placeholder="(123) 345 6789" id="phone" name="user_phone">
            </div>
            <div class="input-container">
                <label>Date: </label>
                <input type="date" id="date" name="date_submited">
            </div>
            <div class="input-container">
                <label>Comment: </label>
                <textarea></textarea>
            </div>
            <div class="btn-container">
                <button class="btn">Send</button>
            </div>
        </form>
    </div>
</body>
</html>
